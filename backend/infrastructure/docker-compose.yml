services:

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api-gateway

  api-gateway:
    build: ./services/api-gateway
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    build: ./services/auth-service
    depends_on:
      postgres:
        condition: service_healthy

  integration-service:
    build: ./services/integration-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sync-worker:
    build: ./services/sync-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  normalization-service:
    build: ./services/normalization-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_started

  analytics-service:
    build: ./services/analytics-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_started

  manual-input-service:
    build: ./services/manual-input-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reporting-service:
    build: ./services/reporting-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scheduler-service:
    build: ./services/scheduler-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
